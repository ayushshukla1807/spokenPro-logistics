version: '3.8'

services:
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/spokenpro
      - UPSTASH_REDIS_REST_URL=http://redis:8080
      - UPSTASH_REDIS_REST_TOKEN=local
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=spokenpro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: eqalpha/keydb:latest
    ports:
      - "6379:6379"

volumes:
  pgdata:
